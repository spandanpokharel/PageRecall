<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PageRecall</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="app">
    <div class="hero">
      <div>
        <div class="brand">
          <span class="brand-badge">🧠</span>
          <span>PageRecall</span>
        </div>
        <div class="subtext">Your private memory vault for the web</div>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
    </div>

    <button id="save-btn" class="primary-btn">Remember This Page</button>

    <div class="search-box">
      <span class="search-icon">🔎</span>
      <input type="text" id="search-input" placeholder="Search your memory...">
    </div>

    <div id="status" class="status" aria-live="polite"></div>
    <div id="results"></div>
  </div>

  <script src="scripts/popup.js"></script>
</body>
</html>
